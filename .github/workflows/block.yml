name: The Alone Repo CI (Auto-Fix & Push)

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write # Direct master par push karne ke liye write permission zaroori hai

jobs:
  full-check:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' # Prevent loop if bot pushes changes

    # This environment variable forces uv to use the GitHub Actions Python environment globally
    env:
      UV_PYTHON: "3.10"

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4 # Downgraded from non-existent v7 to stable v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.13"

      - name: Cache uv
        uses: actions/cache@v4 # Downgraded from non-existent v5 to stable v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Verify uv
        run: uv --version

      - name: Generate uv.lock
        run: |
          rm -f uv.lock
          uv lock --prerelease=allow

      - name: Sync dependencies
        run: uv sync # Removed --frozen so it can actually sync new locks seamlessly

      - name: Install tools
        run: uv pip install black isort ruff pip-audit

      - name: Format python files
        run: |
          uv run black .
          uv run isort .

      - name: Ruff auto fix
        run: |
          uv run ruff check . --fix --unsafe-fixes --exit-zero

      - name: Dependency audit
        continue-on-error: true
        run: uv run pip-audit

      - name: Direct Commit and Push to Master
        shell: bash
        run: |
          # Git setup for the bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Force check uv.lock changes before tracking status
          uv lock --prerelease=allow || true
          
          # Check for modified or untracked files
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes found! Applying auto-fixes directly to master branch..."
            git add -A
            git commit -m "chore: auto repo fix (dependency sync, formatting & ruff cleanups)"
            git push origin master
          else
            echo "No changes detected. Code is completely up to date!"
          fi
          
