name: The Alone Repo CI

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  full-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.x"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Verify uv
        run: uv --version

      - name: Generate uv.lock
        run: uv lock

      - name: Sync dependencies
        run: uv sync

      - name: Install tools
        run: uv pip install black isort ruff pip-audit

      - name: Format python files
        run: |
          uv run black .
          uv run isort .

      - name: Ruff auto fix
        run: |
          uv run ruff check . \
          --fix \
          --unsafe-fixes \
          --exit-zero

      - name: Detect changes
        run: |
          uv lock --check || true
          if [ -n "$(git status --porcelain)" ]; then
            echo "CHANGED=true" >> $GITHUB_ENV
          else
            echo "CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Dependency audit
        continue-on-error: true
        run: uv run pip-audit

      - name: Create Pull Request
        if: env.CHANGED == 'true' && github.actor != 'github-actions[bot]'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "auto repo fix"
          title: "Automated repo auto-fix"
          body: |
            Auto dependency sync
            uv.lock regenerated
            Formatting applied
            Security audit done
          labels: auto-fix
          branch: repo-auto-check-${{ github.run_id }}
          delete-branch: true
